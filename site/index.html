<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafb" media="(prefers-color-scheme: light)" />
    <title>agent-connector — Write your MCP server + hooks once. Ship to every agent.</title>
    <meta
      name="description"
      content="One declarative defineConnector deploys MCP servers, hooks, commands, skills & subagents across 29 AI-agent platforms — with default, platform-independent per-tool token telemetry."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="agent-connector" />
    <meta
      property="og:title"
      content="agent-connector — Write your MCP server + hooks once. Ship to every agent."
    />
    <meta
      property="og:description"
      content="One declarative defineConnector deploys MCP servers, hooks, commands, skills & subagents across 29 AI-agent platforms — with default, platform-independent per-tool token telemetry."
    />
    <meta property="og:url" content="https://agent-connector.ai/" />
    <!-- og.png is generated at build time by scripts/prerender.mjs (playwright
         screenshot). If no Chromium is available at build, the prerender strips
         the og:image/twitter:image tags from dist/ so we never ship a 404 image. -->
    <meta property="og:image" content="https://agent-connector.ai/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="agent-connector — Write your MCP server + hooks once. Ship to every agent."
    />
    <meta
      name="twitter:description"
      content="One declarative defineConnector deploys MCP servers, hooks, commands, skills & subagents across 29 AI-agent platforms — with default, platform-independent per-tool token telemetry."
    />
    <meta name="twitter:image" content="https://agent-connector.ai/og.png" />

    <!-- Canonical: rewritten per-route by scripts/prerender.mjs for every
         prerendered page; this is the landing's self-canonical. -->
    <link rel="canonical" href="https://agent-connector.ai/" />

    <!-- Structured data (landing only — the prerender strips it from docs pages). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "agent-connector",
        "url": "https://agent-connector.ai/",
        "description": "One declarative defineConnector deploys MCP servers, hooks, commands, skills & subagents across 29 AI-agent platforms — with default, platform-independent per-tool token telemetry.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows, macOS, Linux",
        "license": "https://www.apache.org/licenses/LICENSE-2.0",
        "programmingLanguage": "TypeScript"
      }
    </script>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const key = "agent-connector.theme";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
